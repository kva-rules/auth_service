databaseChangeLog:
  - changeSet:
      id: 4
      author: auth-service
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: token_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: auth_user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token
                  type: text
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: timestamp
              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: auth_user_id
            referencedTableName: users
            referencedColumnNames: auth_user_id
