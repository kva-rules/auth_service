databaseChangeLog:
  - changeSet:
      id: 1
      author: auth-service
      changes:
        - createTable:
            tableName: users
            columns:
  - column:
                  name: auth_user_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
  - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
  - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
- column:
                  name: account_status
                  type: varchar(20)
                  defaultValue: 'ACTIVE'
                  constraints:
                    nullable: false
              - column:
                  name: failed_login_attempts
                  type: integer
                  defaultValueNumeric: 0
              - column:
                  name: last_login_at
                  type: timestamp
- column:
                  name: role_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
