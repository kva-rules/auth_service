databaseChangeLog:
  - changeSet:
      id: 2
      author: auth-service
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: role_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: role_name
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: current_timestamp
        - sql:
            sql: INSERT INTO roles (role_name, description) VALUES ('USER', 'Standard user'), ('ADMIN', 'Administrator');
